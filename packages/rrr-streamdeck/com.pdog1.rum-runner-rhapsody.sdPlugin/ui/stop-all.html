<!DOCTYPE html>
<html>

<head lang="en">
    <title>Stop All</title>
    <meta charset="utf-8" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: transparent;
            color: #f0ede6;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: 12px;
            padding: 12px;
            min-height: 100vh;
        }

        /* ── State visibility ───────────────────────────────────────── */

        .state { display: none; }

        .state:not([hidden]) {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.15s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ── State 1 — Connecting ───────────────────────────────────── */

        #state-connecting {
            align-items: center;
            padding: 20px 0 16px;
            gap: 10px;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(245, 168, 0, 0.2);
            border-top-color: #F5A800;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .connecting-label {
            color: #a09a8f;
            text-align: center;
            line-height: 1.5;
        }

        /* ── State 2 — No folder ────────────────────────────────────── */

        #state-no-folder {
            padding: 4px 0;
        }

        .warning-card {
            border-radius: 6px;
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
        }

        .warning-icon {
            font-size: 20px;
            color: #F5A800;
            line-height: 1;
        }

        .warning-primary {
            color: #f0ede6;
            font-weight: 500;
            line-height: 1.4;
        }

        .warning-secondary {
            color: #a09a8f;
            font-size: 11px;
            line-height: 1.4;
        }

        /* ── State 3 — Ready ────────────────────────────────────────── */

        #state-ready {
            padding: 4px 0;
        }

        .stop-card {
            background: rgba(255, 93, 93, 0.1);
            border-radius: 6px;
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        .stop-icon {
            width: 16px;
            height: 16px;
            background: #ff5d5d;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .stop-title {
            color: #f0ede6;
            font-weight: 600;
        }

        .stop-subtitle {
            color: #a09a8f;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <!-- State 1: Not connected to RRR -->
    <div id="state-connecting" class="state">
        <div class="spinner"></div>
        <span class="connecting-label">Connecting to Rum-Runner Rhapsody</span>
    </div>

    <!-- State 2: Connected but no folder selected -->
    <div id="state-no-folder" class="state" hidden>
        <div class="warning-card">
            <span class="warning-icon">⚠</span>
            <span class="warning-primary">Please select a sound clip folder</span>
            <span class="warning-secondary">in Rum-Runner Rhapsody</span>
        </div>
    </div>

    <!-- State 3: Ready -->
    <div id="state-ready" class="state" hidden>
        <div class="stop-card">
            <div class="stop-icon"></div>
            <span class="stop-title">Stop All Sounds</span>
            <span class="stop-subtitle">Stops all currently playing sounds in Rum-Runner Rhapsody.</span>
        </div>
    </div>

    <script>
        let _ws = null;
        let _uuid = null;
        let _action = null;
        let _retryInterval = null;

        setState("connecting");

        window.connectElgatoStreamDeckSocket = function (port, uuid, registerEvent, _info, actionInfo) {
            _uuid = uuid;
            _action = JSON.parse(actionInfo).action;

            _ws = new WebSocket("ws://127.0.0.1:" + port);

            _ws.onopen = () => {
                _ws.send(JSON.stringify({ event: registerEvent, uuid }));
                sendToPlugin({ type: "requestSounds" });
                startRetrying();
            };

            _ws.onclose = () => {
                setState("connecting");
                startRetrying();
            };

            _ws.onmessage = ({ data }) => {
                const msg = JSON.parse(data);
                if (msg.event === "sendToPropertyInspector") {
                    handlePluginMessage(msg.payload);
                }
            };
        };

        function startRetrying() {
            if (_retryInterval) return;
            _retryInterval = setInterval(() => {
                sendToPlugin({ type: "requestSounds" });
            }, 3000);
        }

        function stopRetrying() {
            if (_retryInterval) { clearInterval(_retryInterval); _retryInterval = null; }
        }

        function sendToPlugin(payload) {
            if (_ws?.readyState === WebSocket.OPEN) {
                _ws.send(JSON.stringify({
                    action: _action,
                    event: "sendToPlugin",
                    context: _uuid,
                    payload,
                }));
            }
        }

        function setState(state) {
            document.getElementById("state-connecting").hidden = state !== "connecting";
            document.getElementById("state-no-folder").hidden = state !== "no-folder";
            document.getElementById("state-ready").hidden = state !== "ready";
        }

        function handlePluginMessage(payload) {
            if (!payload || payload.type !== "soundsList") return;
            // Ignore partial messages that are missing required fields.
            if (typeof payload.connected === "undefined" || typeof payload.folderSelected === "undefined") return;

            // connected: false → reset to connecting and keep retrying
            if (payload.connected === false) {
                setState("connecting");
                startRetrying();
                return;
            }

            // connected: true, folderSelected: false → no folder selected
            // connected: true, folderSelected: true → ready
            stopRetrying();

            if (payload.folderSelected === false) {
                setState("no-folder");
            } else {
                setState("ready");
            }
        }
    </script>
</body>

</html>
